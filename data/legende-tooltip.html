<!-- ============================================================
     EINHEITEN-LEGENDE mit Tooltip
     Platzierung: direkt neben dem Gesamt/Pro-Kopf-Umschalter
     ============================================================ -->

<!-- CSS: in deinen bestehenden <style>-Block einfügen -->
<style>
  .legende-wrap {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    position: relative;
  }

  .info-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    color: #888;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    background: transparent;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    position: relative;
  }

  .info-btn:hover,
  .info-btn:focus {
    color: #fff;
    border-color: #fff;
    outline: none;
  }

  /* Tooltip-Box */
  .info-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 12px);
    left: 50%;
    transform: translateX(-50%);
    width: 290px;
    background: #1a1a2e;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 14px 16px;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
  }

  /* Pfeil nach unten */
  .info-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: rgba(255, 255, 255, 0.15);
    margin-top: 0;
  }

  .info-tooltip::before {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: #1a1a2e;
    margin-top: -1px;
    z-index: 1;
  }

  .info-btn:hover .info-tooltip,
  .info-btn:focus .info-tooltip {
    display: block;
  }

  /* Tooltip-Inhalt */
  .tooltip-kopf {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .tooltip-zeile {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .tooltip-zeile:last-of-type {
    margin-bottom: 0;
  }

  .tooltip-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 1px;
    white-space: nowrap;
  }

  .tooltip-badge.gesamt {
    background: rgba(99, 179, 237, 0.2);
    color: #63b3ed;
  }

  .tooltip-badge.prokopf {
    background: rgba(154, 117, 234, 0.2);
    color: #9a75ea;
  }

  .tooltip-text {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.7);
    line-height: 1.5;
  }

  .tooltip-text strong {
    color: #fff;
    font-weight: 600;
  }

  .tooltip-trennlinie {
    border: none;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
    margin: 10px 0;
  }

  .tooltip-fuss {
    font-size: 11.5px;
    color: rgba(255, 255, 255, 0.35);
    line-height: 1.6;
  }
</style>


<!-- HTML: neben deinen bestehenden Gesamt/Pro-Kopf-Buttons einfügen -->
<div class="legende-wrap">
  <button
    class="info-btn"
    aria-label="Einheiten erklären"
    tabindex="0"
  >
    i
    <div class="info-tooltip" role="tooltip">
      <div class="tooltip-kopf">Einheiten</div>

      <div class="tooltip-zeile">
        <span class="tooltip-badge gesamt">Gesamt</span>
        <span class="tooltip-text">
          <strong>MtCO₂e</strong> — Megatonnen CO₂-Äquivalente.
          Alle Treibhausgase (CO₂, CH₄, N₂O&nbsp;…) werden anhand
          ihrer Klimawirkung in CO₂ umgerechnet und summiert.
        </span>
      </div>

      <hr class="tooltip-trennlinie">

      <div class="tooltip-zeile">
        <span class="tooltip-badge prokopf">Pro Kopf</span>
        <span class="tooltip-text">
          <strong>tCO₂e</strong> — Tonnen CO₂-Äquivalente
          pro Person und Jahr.
        </span>
      </div>

      <hr class="tooltip-trennlinie">

      <div class="tooltip-fuss">
        1 Megatonne = 1&thinsp;000&thinsp;000 Tonnen<br>
        Quelle: ClimateWatch / World Bank
      </div>
    </div>
  </button>
</div>
